<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
    <script src="simple-navmesh-constraint.js"></script>
  </head>
  <body>
    
    <!--apkartne-->

      <a-scene keyboard-shortcuts="" screenshot="" xr-mode-ui="" device-orientation-permission-ui="">
      <a-sky color="#29282c " material="color: #29282c"></a-sky>

      <!--makslas telpa-->

      <a-assets>
        <a-asset-item id="mt" material="side: double" src="objekti\mtm.glb"></a-asset-item>
        <a-asset-item id="navmesh-glb" src="objekti\mesh.glb"></a-asset-item>
      </a-assets>

      <!--biblioteka-->

      <a-gltf-model src="#mt" gltf-model="objekti\MTTM.glb" position="0 1.68 0"></a-gltf-model> 
      <a-gltf-model src="#mt" gltf-model="objekti\animacija_412.glb" animation-mixer position="0 1.68 0"></a-gltf-model> 

      <!--navmesh-->
      
      <a-gltf-model id="navmesh" src="#navmesh-glb" position="-0.08482 1.635 -44.07577" navmesh="" gltf-model="objekti\mesh.glb"></a-gltf-model>

      <!-- light -->

      <a-light type="directional" light="type: point; castShadow: true" position="-9.97149 1.79463 2.16235" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-2.82295 1.79463 2.16235" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-9.97149 2.98914 3.01123" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="0.71764 2.98914 3.01123" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="11.05013 2.98914 3.01123" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="ambient" light="type: point; castShadow: true" position="15.88126 2.71555 2.16235" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-11.4467 2.1441 -26.13256" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-11.4467 2.89852 -27.08106" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-8.76268 4.55491 -29.77787" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-9.60982 0.98037 -36.9264" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-9.60982 1.61848 -45.76047" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="4.92765 3.12106 -27.08106" intensity="0.2" shadow-camera-automatic="#objects"></a-light>
      <a-light type="directional" light="type: point; castShadow: true" position="-15.70149 3.09151 -21.51906" intensity="0.2" shadow-camera-automatic="#objects"></a-light>

      <!--kustiba-->

      <a-entity id="rig" movement-controls="speed: 0.2" rotation="0 80 0" position="-6.67504 1.63265 0.01453" gamepad-controls="" trackpad-controls="" keyboard-controls="" touch-controls="">
        <a-entity camera="" look-controls="pointerLockEnabled: true" simple-navmesh-constraint="navmesh:#navmesh;fall:0.5;height:1.65;">
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
